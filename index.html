<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width"></head>
<body style="background:#000;color:#fff;padding:20px;">
<button onclick="start()" style="padding:20px;font-size:16px;">カメラ起動</button>
<div id="msg" style="margin-top:20px;font-size:14px;"></div>
<div id="reader" style="width:100%;margin-top:20px;"></div>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
function start(){
  document.getElementById('msg').textContent='起動中...';
  const qr=new Html5Qrcode('reader');
  qr.start(
    {facingMode:'environment'},
    {fps:10,qrbox:{width:200,height:100}},
    code=>{ document.getElementById('msg').textContent='読取: '+code; },
    ()=>{}
  ).then(()=>{document.getElementById('msg').textContent='カメラ起動OK';})
   .catch(e=>{ document.getElementById('msg').textContent='エラー: '+e; });
}
</script>
</body>
</html>
