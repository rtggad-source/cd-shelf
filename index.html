<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0e0e0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SHELF</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#0e0e0e; --surface:#161616; --surface2:#1e1e1e; --border:#2a2a2a;
  --accent:#e8c547; --accent2:#4fc3a1; --text:#f0f0f0; --text2:#888; --text3:#555;
  --owned:#4fc3a1; --safe:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;overscroll-behavior:none;}

header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:50;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--accent);line-height:1;}
.logo-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:2px;}
.header-actions{display:flex;gap:8px;}
.btn-icon{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:8px 14px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);}

.stats-bar{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.stats-bar::-webkit-scrollbar{display:none;}
.stat{padding:10px 18px;border-right:1px solid var(--border);flex-shrink:0;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);line-height:1;}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;margin-top:2px;}

.tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;padding:0 20px;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:10px 14px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;flex-shrink:0;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

.filters{padding:10px 20px;display:flex;gap:6px;align-items:center;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.chip{padding:4px 10px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.chip.active{background:var(--accent);color:#000;border-color:var(--accent);}
.sort-select{margin-left:auto;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-family:'DM Mono',monospace;font-size:9px;padding:4px 8px;flex-shrink:0;outline:none;}

.main{padding-bottom:calc(60px + var(--safe));}
.flat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}

.artist-group-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);cursor:pointer;background:var(--surface);user-select:none;}
.artist-group-header:active{background:var(--surface2);}
.agh-left{display:flex;align-items:center;gap:10px;}
.agh-name{font-size:14px;font-weight:500;}
.agh-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}
.agh-arrow{font-size:12px;color:var(--text3);transition:transform 0.2s;}
.agh-arrow.open{transform:rotate(90deg);}
.album-grid{display:none;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}
.album-grid.open{display:grid;}

.album-card{background:var(--surface);border:1px solid var(--border);cursor:pointer;position:relative;overflow:hidden;}
.album-card:active{border-color:var(--accent);}
.album-art{width:100%;aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.album-art img{width:100%;height:100%;object-fit:cover;display:block;}
.album-art-ph{font-size:28px;color:var(--text3);}
.album-info{padding:8px 10px 10px;}
.album-artist-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent2);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;text-decoration:underline;text-decoration-color:transparent;transition:text-decoration-color 0.15s;}
.album-artist-label:active{text-decoration-color:var(--accent2);}
.album-title-label{font-size:12px;font-weight:500;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.album-year-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:3px;}
.memo-dot{position:absolute;top:7px;right:7px;width:6px;height:6px;background:var(--accent);border-radius:50%;}

/* DISCOGRAPHY */
.disco-view{padding-bottom:calc(60px + var(--safe));}
.disco-header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);}
.back-btn{background:none;border:none;color:var(--accent);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;padding:0;flex-shrink:0;}
.disco-artist-name{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;}
.disco-summary{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;gap:16px;}
.ds-item{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:6px;}
.ds-dot{width:8px;height:8px;border-radius:50%;}
.disco-item{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);border-left:3px solid transparent;}
.disco-item.owned{border-left-color:var(--owned);}
.disco-art{width:48px;height:48px;background:var(--surface2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.disco-art img{width:100%;height:100%;object-fit:cover;}
.disco-info{flex:1;min-width:0;}
.disco-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.disco-year{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:2px;}
.owned-badge{padding:3px 8px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;flex-shrink:0;}
.owned-badge.yes{background:var(--owned);color:#000;}
.owned-badge.no{border:1px solid var(--border);color:var(--text3);}
.disco-loading{padding:30px;text-align:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);}

/* SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.sheet-overlay.open{opacity:1;pointer-events:all;}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s cubic-bezier(.32,.72,0,1);z-index:201;padding-bottom:calc(20px + var(--safe));}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:36px;height:3px;background:var(--border);border-radius:2px;margin:14px auto 16px;}
.sheet-inner{padding:0 20px 20px;}
.sheet-top{display:flex;gap:14px;margin-bottom:4px;}
.sheet-art{width:80px;height:80px;background:var(--surface2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.sheet-art img{width:100%;height:100%;object-fit:cover;}
.sheet-art-ph{font-size:28px;color:var(--text3);}
.sheet-artist{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent2);letter-spacing:1px;text-transform:uppercase;}
.sheet-title{font-size:17px;font-weight:500;margin:4px 0;line-height:1.3;}
.sheet-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}
.sheet-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;margin-top:16px;}

.genre-wrap{position:relative;}
.genre-wrap::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:12px;}
.genre-select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:9px 30px 9px 10px;outline:none;appearance:none;cursor:pointer;}
.genre-select:focus{border-color:var(--accent);}

.memo-area{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px;resize:none;min-height:70px;outline:none;}
.memo-area:focus{border-color:var(--accent);}
.save-btn{margin-top:10px;background:var(--accent);color:#000;border:none;padding:10px 16px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;width:100%;}
.delete-btn{margin-top:6px;background:transparent;color:#e05a5a;border:1px solid #e05a5a33;padding:10px 16px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;width:100%;}

.sheet-tracks{display:flex;flex-direction:column;}
.track{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);}
.track-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);width:20px;flex-shrink:0;}
.track-name{font-size:12px;flex:1;}
.track-dur{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}
.loading-tracks{padding:16px 0;text-align:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);}

/* SCAN */
.scan-overlay{position:fixed;inset:0;background:#000;z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.scan-overlay.open{display:flex;}
.scan-close{position:absolute;top:20px;right:20px;background:none;border:1px solid var(--border);color:var(--text2);padding:8px 14px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;}
.scan-title{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:2px;}

#reader{width:280px;overflow:hidden;border:1px solid var(--border);}
/* suppress html5-qrcode UI */
#reader__dashboard_section_csr button{background:var(--accent)!important;color:#000!important;border:none!important;font-family:'DM Mono',monospace!important;font-size:11px!important;padding:8px 16px!important;cursor:pointer!important;}
#reader__scan_region img{display:none!important;}
#reader__status_span{font-family:'DM Mono',monospace!important;font-size:10px!important;color:var(--text3)!important;}

.scan-status{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);text-align:center;min-height:18px;padding:0 20px;}
.scan-divider{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:2px;}
.scan-manual{display:flex;gap:8px;align-items:center;}
.scan-input{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:9px 12px;outline:none;width:180px;}
.scan-input:focus{border-color:var(--accent);}
.scan-go{background:var(--accent);color:#000;border:none;padding:9px 16px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe);z-index:50;}
.nav-item{flex:1;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;}
.nav-icon{font-size:18px;}
.nav-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;}
.nav-item.active .nav-label{color:var(--accent);}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:10px 20px;letter-spacing:1px;z-index:400;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.empty-state{padding:60px 20px;text-align:center;}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--text2);}
.empty-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:8px;line-height:1.8;letter-spacing:1px;}
.hidden{display:none!important;}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">SHELF</div>
    <div class="logo-sub">CD COLLECTION</div>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="exportExcel()">↓ XLS</button>
    <button class="btn-icon btn-primary" onclick="openScan()">▦ SCAN</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="statOwned">0</div><div class="stat-label">Owned</div></div>
  <div class="stat"><div class="stat-num" id="statArtists">0</div><div class="stat-label">Artists</div></div>
  <div class="stat"><div class="stat-num" id="statEarliest">—</div><div class="stat-label">Earliest</div></div>
  <div class="stat"><div class="stat-num" id="statLatest">—</div><div class="stat-label">Latest</div></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="setViewMode('grid',this)">Grid</div>
  <div class="tab" onclick="setViewMode('artist',this)">By Artist</div>
</div>

<div class="filters">
  <button class="chip active" onclick="setDecade('all',this)">All</button>
  <button class="chip" onclick="setDecade('60s',this)">60s</button>
  <button class="chip" onclick="setDecade('70s',this)">70s</button>
  <button class="chip" onclick="setDecade('80s',this)">80s</button>
  <button class="chip" onclick="setDecade('90s',this)">90s</button>
  <button class="chip" onclick="setDecade('00s',this)">00s</button>
  <button class="chip" onclick="setDecade('10s',this)">10s+</button>
  <select class="sort-select" id="sortSelect" onchange="renderCollection()">
    <option value="artist">Artist A–Z</option>
    <option value="title">Title A–Z</option>
    <option value="year">Year ↑</option>
    <option value="added">Date Added</option>
  </select>
</div>

<div class="main" id="mainContent">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">💿</div>
    <div class="empty-title">No Albums Yet</div>
    <div class="empty-sub">TAP SCAN TO ADD YOUR FIRST CD<br>OR ENTER BARCODE MANUALLY</div>
  </div>
  <div id="collectionContainer"></div>
</div>

<!-- DISCOGRAPHY -->
<div id="discoView" class="hidden main disco-view">
  <div class="disco-header">
    <button class="back-btn" onclick="closeDisco()">← BACK</button>
    <div class="disco-artist-name" id="discoArtistName"></div>
  </div>
  <div class="disco-summary" id="discoSummary"></div>
  <div id="discoList"></div>
</div>

<!-- DETAIL SHEET -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-inner">
    <div class="sheet-top">
      <div class="sheet-art" id="sheetArt"><div class="sheet-art-ph">💿</div></div>
      <div style="flex:1;min-width:0;">
        <div class="sheet-artist" id="sheetArtist"></div>
        <div class="sheet-title" id="sheetTitle"></div>
        <div class="sheet-meta" id="sheetMeta"></div>
      </div>
    </div>

    <div class="sheet-label">GENRE</div>
    <div class="genre-wrap">
      <select class="genre-select" id="genreSelect"></select>
    </div>

    <div class="sheet-label">MEMO</div>
    <textarea class="memo-area" id="memoArea" placeholder="Add notes about this album..."></textarea>

    <button class="save-btn" onclick="saveSheet()">SAVE</button>
    <button class="delete-btn" onclick="deleteAlbum()">REMOVE FROM COLLECTION</button>

    <div class="sheet-label">TRACKLIST</div>
    <div id="sheetTracks"><div class="loading-tracks">—</div></div>
  </div>
</div>

<!-- SCAN -->
<div class="scan-overlay" id="scanOverlay">
  <button class="scan-close" onclick="closeScan()">CLOSE</button>
  <div class="scan-title">BARCODE SCANNER</div>
  <div id="reader"></div>
  <div class="scan-status" id="scanStatus"></div>
  <div class="scan-divider">— OR ENTER MANUALLY —</div>
  <div class="scan-manual">
    <input class="scan-input" id="barcodeInput" type="tel" placeholder="Barcode number" maxlength="14">
    <button class="scan-go" onclick="lookupBarcode()">GO</button>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" id="navCollection" onclick="showMain()">
    <span class="nav-icon">▤</span><span class="nav-label">Collection</span>
  </div>
  <div class="nav-item" onclick="exportExcel()">
    <span class="nav-icon">↓</span><span class="nav-label">Export</span>
  </div>
  <div class="nav-item" onclick="openScan()">
    <span class="nav-icon">▦</span><span class="nav-label">Scan</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── GENRES ──
const GENRES = [
  'Alternative Rock','Ambient','Blues','Classical','Country','Dream Pop',
  'Electronic','Experimental','Folk','Funk','Gospel','Grunge','Hard Rock',
  'Heavy Metal','Hip-Hop','House','Indie Rock','Jazz','J-Pop','J-Rock',
  'Latin','Math Rock','New Wave','Noise Rock','Pop','Post-Punk','Post-Rock',
  'Progressive Rock','Psychedelic Rock','Punk','R&B / Soul','Reggae','Rock',
  'Shoegaze','Singer-Songwriter','Ska','Soundtrack','Synth-Pop','Techno',
  'Trip-Hop','World','Other'
];

function buildGenreSelect(current) {
  document.getElementById('genreSelect').innerHTML =
    '<option value="">— Select Genre —</option>' +
    GENRES.map(g=>`<option value="${g}"${g===current?' selected':''}>${g}</option>`).join('');
}

// ── DB ──
let db, collection=[], viewMode='grid', activeDecade='all';
let currentAlbumId=null, openArtistGroups=new Set();
let html5QrCode=null, scannerRunning=false;

function initDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('ShelfDB',3);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('albums'))
        d.createObjectStore('albums',{keyPath:'id',autoIncrement:true});
    };
    req.onsuccess=e=>{db=e.target.result;res();};
    req.onerror=rej;
  });
}
function dbGetAll(s){return new Promise((r,j)=>{const t=db.transaction(s,'readonly');const q=t.objectStore(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});}
function dbPut(s,o){return new Promise((r,j)=>{const t=db.transaction(s,'readwrite');const q=t.objectStore(s).put(o);q.onsuccess=()=>r(q.result);q.onerror=j;});}
function dbDelete(s,k){return new Promise((r,j)=>{const t=db.transaction(s,'readwrite');const q=t.objectStore(s).delete(k);q.onsuccess=r;q.onerror=j;});}

// ── RENDER ──
async function loadCollection(){collection=await dbGetAll('albums');updateStats();renderCollection();}

function updateStats(){
  const yrs=collection.map(a=>parseInt(a.year)).filter(Boolean);
  document.getElementById('statOwned').textContent=collection.length;
  document.getElementById('statArtists').textContent=new Set(collection.map(a=>a.artist)).size;
  document.getElementById('statEarliest').textContent=yrs.length?Math.min(...yrs):'—';
  document.getElementById('statLatest').textContent=yrs.length?Math.max(...yrs):'—';
}

function getFiltered(){
  let items=[...collection];
  if(activeDecade!=='all'){
    const r={'60s':[1960,1969],'70s':[1970,1979],'80s':[1980,1989],'90s':[1990,1999],'00s':[2000,2009],'10s':[2010,2099]};
    const [f,t]=r[activeDecade];
    items=items.filter(a=>a.year>=f&&a.year<=t);
  }
  const s=document.getElementById('sortSelect').value;
  items.sort((a,b)=>{
    if(s==='artist')return(a.artist||'').localeCompare(b.artist||'');
    if(s==='title')return(a.title||'').localeCompare(b.title||'');
    if(s==='year')return(a.year||0)-(b.year||0);
    if(s==='added')return(b.addedAt||0)-(a.addedAt||0);
    return 0;
  });
  return items;
}

function renderCollection(){
  const c=document.getElementById('collectionContainer');
  const e=document.getElementById('emptyState');
  const items=getFiltered();
  if(!items.length){c.innerHTML='';e.classList.remove('hidden');return;}
  e.classList.add('hidden');
  viewMode==='grid'?renderFlatGrid(c,items):renderArtistView(c,items);
}

function renderFlatGrid(c,items){
  c.innerHTML=`<div class="flat-grid">${items.map(albumCardHTML).join('')}</div>`;
}

function renderArtistView(c,items){
  const g={};
  items.forEach(a=>{const k=a.artist||'Unknown';if(!g[k])g[k]=[];g[k].push(a);});
  const artists=Object.keys(g).sort((a,b)=>a.localeCompare(b));
  c.innerHTML=artists.map(artist=>{
    const albums=g[artist],isOpen=openArtistGroups.has(artist);
    return `<div class="artist-group-header" onclick="toggleArtistGroup('${escAttr(artist)}')">
      <div class="agh-left"><div class="agh-name">${escHTML(artist)}</div><div class="agh-count">${albums.length} album${albums.length!==1?'s':''}</div></div>
      <div class="agh-arrow ${isOpen?'open':''}">▶</div>
    </div>
    <div class="album-grid ${isOpen?'open':''}">${albums.map(albumCardHTML).join('')}</div>`;
  }).join('');
}

function albumCardHTML(a){
  const img=a.coverUrl?`<img src="${escAttr(a.coverUrl)}" alt="" loading="lazy" onerror="this.style.display='none'">`:`<div class="album-art-ph">💿</div>`;
  return `<div class="album-card" onclick="openSheet(${a.id})">
    <div class="album-art">${img}</div>
    <div class="album-info">
      <div class="album-artist-label" onclick="event.stopPropagation();openDisco('${escAttr(a.artist||'')}')">${escHTML(a.artist||'')}</div>
      <div class="album-title-label">${escHTML(a.title||'')}</div>
      <div class="album-year-label">${a.year||''}${a.genre?' · '+escHTML(a.genre):''}</div>
    </div>
    ${a.memo?'<div class="memo-dot"></div>':''}
  </div>`;
}

function toggleArtistGroup(artist){
  openArtistGroups.has(artist)?openArtistGroups.delete(artist):openArtistGroups.add(artist);
  renderCollection();
}
function setViewMode(mode,el){viewMode=mode;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');openArtistGroups.clear();renderCollection();}
function setDecade(d,el){activeDecade=d;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderCollection();}

// ── SHEET ──
async function openSheet(id){
  const a=collection.find(x=>x.id===id);if(!a)return;
  currentAlbumId=id;
  document.getElementById('sheetArtist').textContent=a.artist||'';
  document.getElementById('sheetTitle').textContent=a.title||'';
  document.getElementById('sheetMeta').textContent=a.year||'';
  document.getElementById('memoArea').value=a.memo||'';
  buildGenreSelect(a.genre||'');
  const art=document.getElementById('sheetArt');
  art.innerHTML=a.coverUrl?`<img src="${escAttr(a.coverUrl)}" alt="">`:`<div class="sheet-art-ph">💿</div>`;
  document.getElementById('sheet').classList.add('open');
  document.getElementById('sheetOverlay').classList.add('open');
  const tr=document.getElementById('sheetTracks');
  tr.innerHTML='<div class="loading-tracks">Loading...</div>';
  if(a.mbid){
    try{const tracks=await fetchTracklist(a.mbid);
      tr.innerHTML=tracks.length?tracks.map((t,i)=>`<div class="track"><span class="track-num">${String(i+1).padStart(2,'0')}</span><span class="track-name">${escHTML(t.title)}</span><span class="track-dur">${msToTime(t.length)}</span></div>`).join(''):'<div class="loading-tracks" style="color:var(--text3)">No tracklist</div>';
    }catch{tr.innerHTML='<div class="loading-tracks" style="color:var(--text3)">Could not load</div>';}
  }else{tr.innerHTML='<div class="loading-tracks" style="color:var(--text3)">No data</div>';}
}

function closeSheet(){document.getElementById('sheet').classList.remove('open');document.getElementById('sheetOverlay').classList.remove('open');currentAlbumId=null;}

async function saveSheet(){
  if(!currentAlbumId)return;
  const a=collection.find(x=>x.id===currentAlbumId);if(!a)return;
  a.memo=document.getElementById('memoArea').value.trim();
  a.genre=document.getElementById('genreSelect').value;
  await dbPut('albums',a);renderCollection();closeSheet();showToast('Saved');
}

async function deleteAlbum(){
  if(!currentAlbumId)return;
  if(!confirm('Remove this album?'))return;
  await dbDelete('albums',currentAlbumId);
  collection=collection.filter(a=>a.id!==currentAlbumId);
  updateStats();renderCollection();closeSheet();showToast('Removed');
}

// ── SCAN ──
function openScan(){
  document.getElementById('scanOverlay').classList.add('open');
  document.getElementById('scanStatus').textContent='';
  document.getElementById('barcodeInput').value='';
  startCamera();
}

function closeScan(){stopCamera();document.getElementById('scanOverlay').classList.remove('open');}

function startCamera(){
  if(scannerRunning)return;
  if(!html5QrCode)html5QrCode=new Html5Qrcode('reader');
  html5QrCode.start(
    {facingMode:'environment'},
    {fps:10,qrbox:{width:240,height:100},
     formatsToSupport:[
       Html5QrcodeSupportedFormats.EAN_13,
       Html5QrcodeSupportedFormats.EAN_8,
       Html5QrcodeSupportedFormats.UPC_A,
       Html5QrcodeSupportedFormats.UPC_E
     ]},
    async(code)=>{
      if(!scannerRunning)return;
      scannerRunning=false;
      document.getElementById('scanStatus').textContent=`Found: ${code}`;
      await lookupBarcode(code);
    },
    ()=>{}
  ).then(()=>{scannerRunning=true;})
   .catch(err=>{
     console.warn('Camera:',err);
     document.getElementById('scanStatus').textContent='Camera unavailable — use manual input below';
   });
}

function stopCamera(){
  if(html5QrCode&&scannerRunning){html5QrCode.stop().catch(()=>{});scannerRunning=false;}
}

document.getElementById('barcodeInput').addEventListener('keydown',e=>{if(e.key==='Enter')lookupBarcode();});

async function lookupBarcode(barcode){
  barcode=barcode||document.getElementById('barcodeInput').value.trim().replace(/\D/g,'');
  if(!barcode)return;
  if(collection.find(a=>a.barcode===barcode)){showToast('Already in collection');closeScan();return;}
  document.getElementById('scanStatus').textContent='Looking up...';
  try{
    const album=await fetchByBarcode(barcode);
    if(!album){document.getElementById('scanStatus').textContent='Not found. Try another.';scannerRunning=true;return;}
    album.barcode=barcode;album.addedAt=Date.now();
    const id=await dbPut('albums',album);album.id=id;collection.push(album);
    updateStats();renderCollection();closeScan();showToast(`Added: ${album.title}`);
  }catch(e){console.error(e);document.getElementById('scanStatus').textContent='Error. Check connection.';scannerRunning=true;}
}

// ── MUSICBRAINZ ──
async function fetchByBarcode(barcode){
  const res=await fetch(`https://musicbrainz.org/ws/2/release/?query=barcode:${barcode}&fmt=json&limit=1`,{headers:{'User-Agent':'ShelfApp/1.0 (personal)'}});
  const data=await res.json();
  if(!data.releases?.length)return null;
  const rel=data.releases[0];
  const artist=rel['artist-credit']?.[0]?.artist?.name||'Unknown Artist';
  const year=rel.date?parseInt(rel.date):null;
  const mbid=rel.id;
  const rgid=rel['release-group']?.id;

  let genre='';
  try{
    const tr=await fetch(`https://musicbrainz.org/ws/2/release-group/${rgid}?inc=tags&fmt=json`,{headers:{'User-Agent':'ShelfApp/1.0 (personal)'}});
    const td=await tr.json();
    const tags=td.tags||[];
    if(tags.length)genre=mapGenre(tags.sort((a,b)=>b.count-a.count)[0].name);
  }catch{}

  let coverUrl=null;
  try{const cr=await fetch(`https://coverartarchive.org/release/${mbid}/front-250`,{method:'HEAD'});if(cr.ok)coverUrl=`https://coverartarchive.org/release/${mbid}/front-250`;}catch{}

  return{mbid,releaseGroupId:rgid,artist,title:rel.title||'Unknown Title',year,genre,coverUrl,memo:''};
}

function mapGenre(raw){
  if(!raw)return'';const r=raw.toLowerCase();
  const map=[
    ['alternative rock','Alternative Rock'],['alt-rock','Alternative Rock'],
    ['ambient','Ambient'],['blues','Blues'],['classical','Classical'],
    ['country','Country'],['dream pop','Dream Pop'],
    ['electronic','Electronic'],['electronica','Electronic'],
    ['experimental','Experimental'],['folk','Folk'],['funk','Funk'],
    ['gospel','Gospel'],['grunge','Grunge'],
    ['hard rock','Hard Rock'],['heavy metal','Heavy Metal'],['metal','Heavy Metal'],
    ['hip hop','Hip-Hop'],['hip-hop','Hip-Hop'],['rap','Hip-Hop'],
    ['house','House'],['indie rock','Indie Rock'],['indie','Indie Rock'],
    ['jazz','Jazz'],['j-pop','J-Pop'],['jpop','J-Pop'],
    ['j-rock','J-Rock'],['jrock','J-Rock'],
    ['latin','Latin'],['math rock','Math Rock'],
    ['new wave','New Wave'],['noise rock','Noise Rock'],
    ['pop','Pop'],['post-punk','Post-Punk'],['post-rock','Post-Rock'],
    ['progressive rock','Progressive Rock'],['prog rock','Progressive Rock'],
    ['psychedelic','Psychedelic Rock'],['punk','Punk'],
    ['r&b','R&B / Soul'],['soul','R&B / Soul'],['rhythm and blues','R&B / Soul'],
    ['reggae','Reggae'],['rock','Rock'],['shoegaze','Shoegaze'],
    ['singer-songwriter','Singer-Songwriter'],['ska','Ska'],
    ['soundtrack','Soundtrack'],['synth-pop','Synth-Pop'],['synthpop','Synth-Pop'],
    ['techno','Techno'],['trip-hop','Trip-Hop'],['trip hop','Trip-Hop'],
    ['world','World'],['world music','World']
  ];
  for(const[k,v]of map)if(r.includes(k))return v;
  return'';
}

async function fetchTracklist(mbid){
  const res=await fetch(`https://musicbrainz.org/ws/2/release/${mbid}?inc=recordings&fmt=json`,{headers:{'User-Agent':'ShelfApp/1.0 (personal)'}});
  const data=await res.json();
  if(!data.media?.length)return[];
  return data.media.flatMap(m=>m.tracks||[]).map(t=>({title:t.title,length:t.length}));
}

function msToTime(ms){if(!ms)return'';const s=Math.round(ms/1000);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}

// ── DISCOGRAPHY ──
function showMain(){
  document.getElementById('mainContent').classList.remove('hidden');
  document.getElementById('discoView').classList.add('hidden');
  document.getElementById('navCollection').classList.add('active');
}

async function openDisco(artistName){
  if(!artistName)return;
  document.getElementById('mainContent').classList.add('hidden');
  document.getElementById('discoView').classList.remove('hidden');
  document.getElementById('navCollection').classList.remove('active');
  document.getElementById('discoArtistName').textContent=artistName;
  document.getElementById('discoList').innerHTML='<div class="disco-loading">Loading discography...</div>';
  document.getElementById('discoSummary').innerHTML='';
  try{
    const myAlbum=collection.find(a=>a.artist===artistName&&a.mbid);
    if(!myAlbum)throw new Error('No MB data');
    const rr=await fetch(`https://musicbrainz.org/ws/2/release/${myAlbum.mbid}?inc=artist-credits&fmt=json`,{headers:{'User-Agent':'ShelfApp/1.0 (personal)'}});
    const rd=await rr.json();
    const artistMBID=rd['artist-credit']?.[0]?.artist?.id;
    if(!artistMBID)throw new Error('No artist MBID');
    const gr=await fetch(`https://musicbrainz.org/ws/2/release-group?artist=${artistMBID}&type=album&fmt=json&limit=100`,{headers:{'User-Agent':'ShelfApp/1.0 (personal)'}});
    const gd=await gr.json();
    const rgs=(gd['release-groups']||[])
      .filter(rg=>rg['primary-type']==='Album'&&(!rg['secondary-types']||!rg['secondary-types'].length))
      .sort((a,b)=>(a['first-release-date']||'').localeCompare(b['first-release-date']||''));
    const ownedRGIDs=new Set(collection.filter(a=>a.artist===artistName).map(a=>a.releaseGroupId));
    const ownedCount=rgs.filter(rg=>ownedRGIDs.has(rg.id)).length;
    document.getElementById('discoSummary').innerHTML=`
      <div class="ds-item"><div class="ds-dot" style="background:var(--owned)"></div><span style="color:var(--text2)">${ownedCount} owned</span></div>
      <div class="ds-item"><div class="ds-dot" style="background:var(--border)"></div><span style="color:var(--text3)">${rgs.length-ownedCount} not owned</span></div>`;
    document.getElementById('discoList').innerHTML=rgs.map(rg=>{
      const isOwned=ownedRGIDs.has(rg.id);
      const year=rg['first-release-date']?rg['first-release-date'].slice(0,4):'—';
      const oa=collection.find(a=>a.releaseGroupId===rg.id);
      const imgHTML=oa?.coverUrl?`<img src="${escAttr(oa.coverUrl)}" alt="" loading="lazy">`:`<div style="font-size:18px;color:var(--text3)">💿</div>`;
      return`<div class="disco-item ${isOwned?'owned':''}">
        <div class="disco-art">${imgHTML}</div>
        <div class="disco-info"><div class="disco-title">${escHTML(rg.title)}</div><div class="disco-year">${year}</div></div>
        <div class="owned-badge ${isOwned?'yes':'no'}">${isOwned?'OWNED':'—'}</div>
      </div>`;
    }).join('');
  }catch(e){console.error(e);document.getElementById('discoList').innerHTML='<div class="disco-loading">Could not load. Check connection.</div>';}
}

function closeDisco(){showMain();}

// ── EXPORT ──
function exportExcel(){
  if(!collection.length){showToast('Nothing to export');return;}
  const rows=collection.map(a=>({Artist:a.artist||'',Title:a.title||'',Year:a.year||'',Genre:a.genre||'',Barcode:a.barcode||'',Memo:a.memo||'',Added:a.addedAt?new Date(a.addedAt).toLocaleDateString():''}));
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Collection');
  XLSX.writeFile(wb,'cd-shelf.xlsx');
  showToast('Exported');
}

// ── UTILS ──
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function escHTML(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

initDB().then(loadCollection);
</script>
